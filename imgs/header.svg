<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes rotate {
					0% {
						transform: rotate(3deg);
					}
					100% {
						transform: rotate(-3deg);
					}
				}

				@keyframes gradientBackground {
					0% {
						background-position: 0% 50%;
					}
					50% {
						background-position: 100% 50%;
					}
					100% {
						background-position: 0% 50%;
					}
				}

				@keyframes fadeIn {
					0% {
						opacity: 0;
					}
					66% {
						opacity: 0;
					}
					100% {
						opacity: 1;
					}
				}

				.container {
					font-family:
						system-ui,
						-apple-system,
						'Segoe UI',
						Roboto,
						Helvetica,
						Arial,
						sans-serif,
						'Apple Color Emoji',
						'Segoe UI Emoji';
					display: flex;
					flex-direction: column;
					align-items: center;
					justify-content: center;
					margin: 0;
					width: 100%;
					height: 400px;

					/* Wear OS inspired 4-color gradient */
					background: linear-gradient(
						90deg,
						#4285f4 0%,
						#34a853 33%,
						#fbbc05 66%,
						#ea4335 100%
					);
					background-size: 300% 300%;
					animation: gradientBackground 8s ease infinite;

					border-radius: 10px;
					color: white;
					text-align: center;
				}

				h1 {
					font-size: 50px;
					line-height: 1.3;
					letter-spacing: 5px;
					text-transform: uppercase;
					text-shadow:
						0 1px 0 rgba(0, 0, 0, 0.3),
						0 2px 0 rgba(0, 0, 0, 0.25),
						0 3px 0 rgba(0, 0, 0, 0.2),
						0 4px 0 rgba(0, 0, 0, 0.15),
						0 12px 5px rgba(0, 0, 0, 0.25);
					animation: rotate ease-in-out 1s infinite alternate;
				}

				h2 {
					font-size: 20px;
					line-height: 1;
					letter-spacing: 5px;
					text-transform: uppercase;
					text-shadow:
						0 1px 0 rgba(0, 0, 0, 0.3),
						0 2px 0 rgba(0, 0, 0, 0.25),
						0 3px 0 rgba(0, 0, 0, 0.2),
						0 4px 0 rgba(0, 0, 0, 0.15),
						0 12px 5px rgba(0, 0, 0, 0.25);
					animation: rotate ease-in-out 1s infinite alternate;
				}

				p {
					font-size: 20px;
					text-shadow: 0 1px 0 rgba(0, 0, 0, 0.3);
					animation: 5s ease 0s normal forwards 1 fadeIn;
				}
			</style>
			<div class="container">
				<h1>Geminiman Wellness Companion</h1>
				<h2>...Everything you need to know about the App...</h2>
				<p>...Scroll down and see it all...</p>
			</div>
		</div>
	</foreignObject>
</svg>

